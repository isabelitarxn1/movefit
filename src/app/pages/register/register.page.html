<ion-content class="register-page">
  <main class="register-container">
    <section class="register-card">

      <div class="register-header">
        <button class="back-button" type="button" aria-label="Volver">
          <ion-icon name="arrow-back-outline"></ion-icon>
        </button>

        <h1>Crear cuenta</h1>
      </div>

      <p class="register-description">
        Regístrate para crear tus rutinas y hacer seguimiento de tu progreso
      </p>

      <form class="register-form">
        <div class="field-group">
          <label for="fullName">Nombre completo</label>
          <input
            id="fullName"
            type="text"
            placeholder="Isabel Madrigal"
            autocomplete="name"
          />
        </div>

        <div class="field-group">
          <label for="email">Correo electrónico</label>
          <input
            id="email"
            type="email"
            placeholder="isabel@correo.com"
            autocomplete="email"
          />
        </div>

        <div class="field-group">
          <label for="password">Contraseña</label>
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>

        <div class="field-group">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input
            id="confirmPassword"
            type="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>

        <div class="row-fields">
          <div class="field-group">
            <label for="weight">Peso (kg)</label>
            <input
              id="weight"
              type="number"
              placeholder="58"
            />
          </div>

          <div class="field-group">
            <label for="height">Altura (cm)</label>
            <input
              id="height"
              type="number"
              placeholder="163"
            />
          </div>
        </div>

        <button class="register-button" type="submit">
          Crear cuenta
        </button>

        <a class="login-link" href="/login">
          ¿Ya tienes cuenta? Inicia sesión
        </a>
      </form>

    </section>
  </main>
</ion-content>
