<ion-content class="register-page">
  <main class="register-container">
    <section class="register-card">

      <div class="register-header">
        <button class="back-button" type="button" aria-label="Volver" routerLink="/login">
          <ion-icon name="arrow-back-outline"></ion-icon>
        </button>

        <h1>Crear cuenta</h1>
      </div>

      <p class="register-description">
        Regístrate para crear tus rutinas y hacer seguimiento de tu progreso
      </p>

      <form class="register-form" (ngSubmit)="onSubmit()">
        <div class="field-group">
          <label for="fullName">Nombre completo <span class="required" aria-hidden="true">*</span></label>
          <input
            id="fullName"
            name="fullName"
            type="text"
            placeholder="Isabel Madrigal"
            autocomplete="name"
            aria-required="true"
            [(ngModel)]="fullName"
          />
        </div>

        <div class="field-group">
          <label for="email">Correo electrónico <span class="required" aria-hidden="true">*</span></label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="isabel@correo.com"
            autocomplete="email"
            aria-required="true"
            [(ngModel)]="email"
          />
        </div>

        <div class="field-group">
          <label for="password">Contraseña <span class="required" aria-hidden="true">*</span></label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="••••••••"
            autocomplete="new-password"
            aria-required="true"
            [(ngModel)]="password"
          />
        </div>

        <div class="field-group">
          <label for="confirmPassword">Confirmar contraseña <span class="required" aria-hidden="true">*</span></label>
          <input
            id="confirmPassword"
            name="confirmPassword"
            type="password"
            placeholder="••••••••"
            autocomplete="new-password"
            aria-required="true"
            [(ngModel)]="confirmPassword"
          />
        </div>

        <div class="row-fields">
          <div class="field-group">
            <label for="weight">Peso (kg) <span class="required" aria-hidden="true">*</span></label>
            <input
              id="weight"
              name="weight"
              type="number"
              placeholder="58"
              aria-required="true"
              [(ngModel)]="weightKg"
            />
          </div>

          <div class="field-group">
            <label for="height">Altura (cm) <span class="required" aria-hidden="true">*</span></label>
            <input
              id="height"
              name="height"
              type="number"
              placeholder="163"
              aria-required="true"
              [(ngModel)]="heightCm"
            />
          </div>
        </div>

        @if (error()) {
          <p class="form-error">{{ error() }}</p>
        }

        <button class="register-button" type="submit" [disabled]="loading()">
          {{ loading() ? 'Creando…' : 'Crear cuenta' }}
        </button>

        <a class="login-link" routerLink="/login">
          ¿Ya tienes cuenta? Inicia sesión
        </a>
      </form>

    </section>
  </main>
</ion-content>
